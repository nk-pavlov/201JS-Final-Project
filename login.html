<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopFlow — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-wrapper">

    <div class="header-brand" style="justify-content:center">
      <a href="index.html" style="display:flex;align-items:center;gap:8px">
        <span class="brand-icon">◈</span>
        <span class="brand-name">ShopFlow</span>
      </a>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to manage your catalog</p>

      <form id="login-form" class="auth-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" placeholder="Enter your username" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Enter your password" />
        </div>

      
        <p class="error-msg hidden" id="login-error">Please fill in all fields.</p>

        <button class="btn btn-primary btn-full" type="submit">Sign in</button>

      </form>

      <p class="auth-hint">Demo: any username + any password will work</p>
    </div>

  </div>

  <script type="module" src="js/auth.js"></script>

</body>
</html>
